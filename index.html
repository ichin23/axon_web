<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AXON - PD Games</title>
    <link
      rel="icon"
      href="assets/media/icons/favicon.svg"
      type="image/x-icon"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="./CSS/styles.css">
    <link rel="stylesheet" href="./CSS/header.css">
    <link rel="stylesheet" href="./CSS/menu.css">
    <link rel="stylesheet" href="./CSS/index.css">

    <!-- Scripts -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script type="module" src="./js/homepage.js"></script>
  </head>

  <body class="d-flex flex-column flex-md-row">
    <header>
        <a class="logo" href="/">
            <img src="./img/logo_axon.png" alt="">
        </a>
        <nav class="navMenu glassBg">
            <ul>
                <li>
                  <a href="#recentlySection" class="menuItem">
                    <i class="bi bi-clock-history"></i>
                    <span>Recentes</span>
                  </a>
                </li>
                <li>
                  <a href="#trendingSection" class="menuItem">
                    <i class="bi bi-graph-up"></i>
                    <span>Em alta</span>
                  </a>
                </li>
                <li>
                  <a href="#favoritesSection" class="menuItem">
                    <i class="bi bi-heart"></i>
                    <span>Favoritos</span>
                  </a>
                </li>
            </ul>
        </nav>
      </header>
      <main class="w-100 h-100 d-flex flex-column justify-content-start align-items-center">
        <form action="/search/index.html">
            <input class="glassBg" placeholder="Busca" name="query" type="search">
        </form>
        <section id="recentlySection">
          <div class="recentlyPlayed"></div>
          <div class="notFound">
            <i class="bi bi-controller"></i>
            <span>Nenhum jogo aberto ainda...</span>
          </div>
        </section>
        <section id="trendingSection">
          <h1>Jogos em alta</h1>
        </section>

        <section id="favoritesSection">
          <h1>Jogos favoritos</h1>
          <div class="favoritesGames">
            
          </div>
        </section>
      </main>
   
  </body>

</html>
