<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AXON - PD Games</title>
    <link
      rel="icon"
      href="assets/media/icons/favicon.svg"
      type="image/x-icon"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="../CSS/styles.css" />
    <link rel="stylesheet" href="../CSS/menu.css" />
    <link rel="stylesheet" href="./CSS/game.css" />

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module" src="./js/game.js"></script>
  </head>

  <body>
    <header>
      <a class="logo" href="/">
        <img src="../img/logo_axon.png" alt="" />
      </a>
      <form action="/search//index.html" class="w-100 h-100 d-flex justify-content-center align-items-center">
        <input class="glassBg" placeholder="Busca" name="query" type="search" />
      </form>
    </header>

    <main>
      <article class="gameDetails d-flex flex-column flex-md-row glassBg">
        <h2 class="gameTitle d-block d-md-none"></h2>
        <aside class="imagesSec">
          
          
          <div class="hoverVerMais">
            <i class="bi bi-eye"></i>
            Ver mais imagens
          </div>
        </aside>

        
        <section>
          <h2 class="gameTitle d-none d-md-block"></h2>
          <p class="gameDescription"></p>

          
          <div class="rating">
            <i class="bi bi-star-fill"></i>
            <span class="gameRating"></span>
            <span class="ratingCount"></span>
          </div>

          <div>
            <button class="primaryBtn playBtn">Jogar</button>
            <button class="outlineBtn favoriteBtn">
              <i class="bi bi-heart"></i>
              <span>Adicionar aos favoritos</span>
            </button>
          </div>
        </section>
      </article>
      <article class="gameRequisitos glassBg">
        <div>
          <h4>Requisitos Mínimos</h4>
          <span class="minRequirements"></span>
        </div>
        <div>
          <h4>Requisitos Recomendados</h4>
          <span class="recomendedRequirements"></span>
        </div>
      </article>
      <article class="storesSec glassBg">

      </article>
    </main>

    <div class="modal fade" id="modalGamesImages" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-body">
            <div id="carouselImagesGame" class="carousel slide">
              <div class="carousel-inner carousel-games-images">
                
              </div>
              <button class="carousel-control-prev" type="button" data-bs-target="#carouselImagesGame" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Anterior</span>
              </button>
              <button class="carousel-control-next" type="button" data-bs-target="#carouselImagesGame" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Próximo</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
